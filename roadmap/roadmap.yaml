labels:
  roadmap:
    color: "1D76DB"
    description: "Tracked in the Open Science Pillars organization roadmap"
  roadmap:proposal:
    color: "D4C5F9"
    description: "Organization proposal awaiting repository maintainer decision"
  roadmap:accepted:
    color: "0E8A16"
    description: "Accepted by repository maintainers"
  roadmap:deferred:
    color: "FBCA04"
    description: "Deferred by repository maintainers"
  roadmap:rejected:
    color: "B60205"
    description: "Rejected by repository maintainers"
  status:blocked:
    color: "B60205"
    description: "Blocked on a documented dependency or gate"
  priority:P0:
    color: "B60205"
    description: "Immediate priority"
  priority:P1:
    color: "D93F0B"
    description: "Near-term priority"
  priority:P2:
    color: "FBCA04"
    description: "Later priority"

decisions:
  - id: ai4s-2026
    title: AI-for-Science submission
    status: declined
    decided: 2026-07-15
    rationale: "The project owner decided not to submit."
    seed_issue: false

initiatives:
  - id: truth-reconciliation
    title: Federated roadmap and truth reconciliation
    outcome: "The organization has a team-safe roadmap harness and public documentation that matches repository reality."
    status: active
    priority: P0
    depends_on: []
    gate: null
    deliverables:
