        title: Build the federated roadmap harness
        repo: build-kit
        proposal_state: accepted
        status: active
        priority: P0
        depends_on: []
        gate: null
        acceptance:
          - "Roadmap YAML validates and renders deterministically."
          - "Claude and Codex can audit and brief roadmap work."
          - "All GitHub writes are dry-run unless explicitly confirmed."
        evidence:
          - "docs/roadmap-harness-plan.md"
          - "docs/roadmap-implementation-guide.md"
        contributor:
          readiness: owner-only
          champion: PaulMRamirez
          prerequisites: [Python, GitHub CLI, organization governance]
        labels: [roadmap, priority:P0]
        issue:
          seed: false
          number: null
          url: null
